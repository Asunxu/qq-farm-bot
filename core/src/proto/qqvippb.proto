syntax = "proto3";

package gamepb.qqvippb;

import "corepb.proto";

// ============ QQ会员服务 ============

// --- 获取QQ会员礼包状态 ---
message GetQQVipRewardsStatusRequest {}

message GetQQVipRewardsStatusReply {
    bool has_gift = 1;      // 是否有礼包
    bool can_claim = 2;     // 是否可以领取
}

// --- 领取QQ会员礼包 ---
message ClaimQQVipRewardsRequest {
    repeated int32 vip_types = 1;  // 1: QQ会员，2: 超级会员
}

message ClaimQQVipRewardsReply {
    repeated corepb.Item items = 1;  // 奖励物品列表
}
